# Stale bot: mark inactive issues; question issues use shorter stale window

daysUntilStale: 30
daysUntilClose: 30
staleLabel: stale
exemptLabels:
  - question
exemptProjects: true
exemptMilestones: true
only: issues

issues:
  staleLabel: stale
  daysUntilStale: 30
  daysUntilClose: 30
  exemptLabels:
    - question
  exemptProjects: true
  exemptMilestones: true
  markComment: >
    This issue has been inactive for 30 days and was marked stale. It will close in 30 days without activity.
  closeComment: >
    This issue was closed and locked. Open a new issue if needed.

  labels:
    question:
      daysUntilStale: 15
      daysUntilClose: 30
      staleLabel: stale
      markComment: >
        This question has been inactive for 15 days and was marked stale. It will close in 30 days without activity.
      closeComment: >
        This issue was closed and locked. Open a new issue if needed.

lockClosed: true
