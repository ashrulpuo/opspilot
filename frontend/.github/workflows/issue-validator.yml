name: Issue Validator

on:
  issues:
    types: [opened]

concurrency:
  group: 'issue-validator-${{ github.event.issue.number }}'
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Issue Format
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            console.log('Validating issue format...');
            console.log(`Title: ${issue.title}`);
            console.log(`Body length: ${body.length}`);

            let validationErrors = [];
            let debugInfo = [];

            const hasOS = body.includes('### Operating system') && body.includes('- [ ]');
            const hasBrowser = body.includes('### Browser') && body.includes('- [ ]');
            const hasVersion = body.includes('### Code version') && body.includes('- [ ]');

            const isBug = issue.labels.some(label =>
              typeof label === 'string' ? label === 'bug' : label.name === 'bug'
            );
            const hasSteps = body.includes('## Steps to reproduce') || body.includes('## Description');

            const hasChecklist = body.includes('## Checklist') && body.includes('- [ ]');

            if (!hasOS) {
              validationErrors.push('Missing operating system section');
              debugInfo.push('Need ### Operating system with checkboxes');
            } else {
              console.log('OS section OK');
            }

            if (!hasBrowser) {
              validationErrors.push('Missing browser section');
              debugInfo.push('Need ### Browser with checkboxes');
            } else {
              console.log('Browser section OK');
            }

            if (!hasVersion) {
              validationErrors.push('Missing code version section');
              debugInfo.push('Need ### Code version with checkboxes');
            } else {
              console.log('Version section OK');
            }

            if (isBug && !hasSteps) {
              validationErrors.push('Bug reports need Steps to reproduce or Description');
              debugInfo.push('Need ## Steps to reproduce or ## Description');
            } else if (isBug) {
              console.log('Reproduction section OK');
            } else {
              console.log('Skipping reproduction (not labeled bug)');
            }

            if (!hasChecklist) {
              validationErrors.push('Missing checklist');
              debugInfo.push('Need ## Checklist with checkboxes');
            } else {
              console.log('Checklist OK');
            }

            if (validationErrors.length > 0) {
              console.log('Issue validation failed');
              console.log('Errors:', validationErrors);

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['needs-info']
                });
                console.log('Added needs-info');
              } catch (e) {
                console.log('Label error:', e.message);
              }

              const commentBody = `**Issue format validation failed**\n\n### Issues\n\n${validationErrors.join('\n\n')}\n\nPlease use the issue template.`;

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: commentBody
                });
                console.log('Posted comment');
              } catch (e) {
                console.log('Comment error:', e.message);
              }

              core.setFailed(`Issue format validation failed: ${validationErrors.join(', ')}`);
            } else {
              console.log('Issue validation passed');

              const labelsToRemove = ['invalid', 'needs-info'];
              for (const label of labelsToRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: label
                  });
                  console.log(`Removed label ${label}`);
                } catch (e) {
                  console.log(`Label ${label} not present`);
                }
              }

              if (issue.state === 'closed') {
                try {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'open'
                  });
                  console.log('Reopened issue');
                } catch (e) {
                  console.log('Reopen error:', e.message);
                }
              }

              console.log('Issue is ready.');
            }
