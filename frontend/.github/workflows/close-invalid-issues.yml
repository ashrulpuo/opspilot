name: Close Invalid Issues

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-invalid-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close Invalid Issues
        uses: actions/github-script@v7
        with:
          script: |
            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const issue of allIssues.data) {
              const createdAt = new Date(issue.created_at);
              const now = new Date();
              const hoursDiff = (now - createdAt) / (1000 * 60 * 60);

              const hasNeedsInfo = issue.labels.some(label => label.name === 'needs-info');
              const hasInvalid = issue.labels.some(label => label.name === 'invalid');

              if (hoursDiff >= 24) {
                if (hasNeedsInfo && !hasInvalid) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['invalid']
                  });

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: 'This issue has been open over 24 hours with needs-info. Added invalid label.\n\nPlease update within 24 hours or it may be closed.'
                  });
                } else if (hasInvalid) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: 'Closing: invalid format after 24 hours. Open a new issue using the template if needed.'
                  });

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed'
                  });
                }
              }
            }
