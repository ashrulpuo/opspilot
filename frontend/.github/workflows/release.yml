name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          YQ_VERSION="v4.43.1"
          wget -O yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Generate changelog
        id: changelog
        env:
          CONFIG_FILE: .github/release.yml
        run: |
          # Load label -> category title map from release.yml
          declare -A category_map
          while IFS=";" read -r title labels; do
              for label in $labels; do
                  category_map[$label]="$title"
              done
          done < <(yq -o=tsv '.categories[] | [.title, (.labels | join(" "))] | join(";")' $CONFIG_FILE)
          # Commit range between previous tag and current tag
          mapfile -t tags < <(git tag -l --sort=-version:refname)
          current_tag=${tags[0]}
          previous_tag=${tags[1]:-}
          if [[ -z "$previous_tag" ]]; then
              # First release: include all commits
              echo "First release tag: $current_tag"
              commits=$(git log --pretty=format:"%s|%h" || true)
              commit_range="HEAD"
          else
              commit_range="$previous_tag..$current_tag"
              echo "Commit range: $commit_range"
              commits=$(git log --pretty=format:"%s|%h" "$commit_range" || true)
          fi
          # Build categorized changelog
          declare -A log_entries
          while IFS="|" read -r subject hash; do
              # type=$(echo "$subject" | cut -d':' -f1 | tr -d ' ')
              type=$(echo "$subject" | sed -E 's/^([[:alnum:]]+)(\(.*\))?:.*/\1/' | tr -d ' ')
              found=0
              for label in "${!category_map[@]}"; do
                  if [[ "$type" == "$label" ]]; then
                      entry="- ${subject} (${hash:0:7})"
                      log_entries[${category_map[$label]}]+="$entry"$'\n'
                      found=1
                      break
                  fi
              done
              if [[ $found -eq 0 ]]; then
                  entry="- ${subject} (${hash:0:7})"
                  log_entries["Other"]+="$entry"$'\n'
              fi
          done <<< "$commits"

          # Stats
          commit_count=$(git log --oneline "$commit_range" | wc -l)
          file_count=$(git diff --name-only "$commit_range" | wc -l)
          # Contributors
          contributor_stats=$(git shortlog -sn "$commit_range")
          contributor_notes=""
          while IFS= read -r line; do
              commits=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | awk '{$1=""; print $0}' | sed 's/^ //')
              contributor_notes+="- ${name} (${commits} commits)\n"
          done <<< "$contributor_stats"
          release_notes="## Changelog ($current_tag)\n\n"
          while IFS= read -r category; do
              if [[ -n "${log_entries[$category]}" ]]; then
                  release_notes+="### $category\n${log_entries[$category]}\n"
              fi
          done < <(yq '.categories[].title' $CONFIG_FILE)
          current_date=$(date +"%Y-%m-%d")
          release_notes+="### Release date: ${current_date}\n"
          release_notes+="### Stats\n"
          release_notes+="- Commits: ${commit_count}\n"
          release_notes+="- Files changed: ${file_count}\n\n"
          release_notes+="### Contributors\n"
          release_notes+="Thank you (by commit count):\n"
          release_notes+="${contributor_notes}\n"
          release_notes+="---\n"
          echo -e "$release_notes" > changelog.md
          echo "Changelog:"
          cat changelog.md
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: false
          bodyFile: changelog.md
          tag: ${{ github.ref_name }}