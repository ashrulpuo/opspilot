---
# Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opspilot-ingress
  namespace: opspilot
  labels:
    app: opspilot
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/websocket-services: "opspilot-backend"
spec:
  tls:
    - hosts:
        - app.opspilot.com
        - api.opspilot.com
      secretName: opspilot-tls
  rules:
    # Frontend
    - host: app.opspilot.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opspilot-frontend
                port:
                  number: 80
    # Backend API
    - host: api.opspilot.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opspilot-backend
                port:
                  number: 8000
    # Backend API (alternative domain)
    - host: app.opspilot.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opspilot-backend
                port:
                  number: 8000
---
# ClusterIssuer for Let's Encrypt (SSL certificates)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: opspilot
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@opspilot.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
# IngressClass for NGINX
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  labels:
    app: opspilot
spec:
  controller: k8s.io/ingress-nginx
