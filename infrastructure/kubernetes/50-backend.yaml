---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-backend
  namespace: opspilot
  labels:
    app: opspilot
    tier: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: opspilot
      tier: backend
  template:
    metadata:
      labels:
        app: opspilot
        tier: backend
        version: v1.0.0
    spec:
      containers:
        - name: backend
          image: opspilot-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # From ConfigMap
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: APP_ENV
            - name: API_V1_STR
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: API_V1_STR
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: ALLOWED_ORIGINS
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: ALGORITHM
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: DATABASE_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: REDIS_DB
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: VAULT_ADDR
            - name: VAULT_ENGINE
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: VAULT_ENGINE
            - name: VAULT_VERIFY_SSL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: VAULT_VERIFY_SSL
            - name: SALT_API_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: SALT_API_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: CELERY_RESULT_BACKEND
            - name: ENABLE_METRICS
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: ENABLE_METRICS
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: METRICS_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: LOG_LEVEL
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: LOG_FORMAT
            - name: EMAIL_SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: EMAIL_SMTP_HOST
            - name: EMAIL_SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: EMAIL_SMTP_PORT
            - name: EMAIL_SMTP_USE_TLS
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: EMAIL_SMTP_USE_TLS
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: APP_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: FRONTEND_URL
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: API_URL
            - name: BACKEND_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: BACKEND_CORS_ORIGINS
            - name: BACKEND_HOST
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: BACKEND_HOST
            - name: BACKEND_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: BACKEND_PORT
            
            # From Secrets
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: DATABASE_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: SECRET_KEY
            - name: SALT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: SALT_API_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: REDIS_PASSWORD
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: VAULT_TOKEN
            - name: SALT_API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: SALT_API_USERNAME
            - name: SALT_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: SALT_API_PASSWORD
            - name: EMAIL_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: EMAIL_SMTP_USERNAME
            - name: EMAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: EMAIL_SMTP_PASSWORD
            - name: EMAIL_SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: EMAIL_SMTP_FROM
            
            # Construct database URL
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-backend
  namespace: opspilot
  labels:
    app: opspilot
    tier: backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: opspilot
    tier: backend
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opspilot-backend-hpa
  namespace: opspilot
  labels:
    app: opspilot
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opspilot-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
