---
# Redis Deployment
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opspilot-redis-pvc
  namespace: opspilot
  labels:
    app: opspilot
    tier: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-redis
  namespace: opspilot
  labels:
    app: opspilot
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opspilot
      tier: cache
  template:
    metadata:
      labels:
        app: opspilot
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - yes
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: opspilot-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-redis
  namespace: opspilot
  labels:
    app: opspilot
    tier: cache
spec:
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: opspilot
    tier: cache
  type: ClusterIP
