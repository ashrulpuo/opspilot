---
# Vault Deployment
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opspilot-vault-pvc
  namespace: opspilot
  labels:
    app: opspilot
    tier: secrets
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-vault
  namespace: opspilot
  labels:
    app: opspilot
    tier: secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opspilot
      tier: secrets
  template:
    metadata:
      labels:
        app: opspilot
        tier: secrets
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:latest
          ports:
            - containerPort: 8200
              name: vault
          env:
            - name: VAULT_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_API_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_CLUSTER_ADDR
              value: https://0.0.0.0:8201
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: opspilot-secrets
                  key: VAULT_TOKEN
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: 0.0.0.0:8200
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: vault-data
          persistentVolumeClaim:
            claimName: opspilot-vault-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-vault
  namespace: opspilot
  labels:
    app: opspilot
    tier: secrets
spec:
  ports:
    - port: 8200
      targetPort: 8200
      name: vault
  selector:
    app: opspilot
    tier: secrets
  type: ClusterIP
