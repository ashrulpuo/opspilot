---
apiVersion: v1
kind: Secret
metadata:
  name: opspilot-secrets
  namespace: opspilot
type: Opaque
stringData:
  # Database
  DATABASE_PASSWORD: "change-this-to-secure-password"

  # JWT
  SECRET_KEY: "change-this-to-secure-32-char-min-random-key"
  SALT_API_KEY: "change-this-to-secure-32-char-min-random-key"

  # Redis
  REDIS_PASSWORD: "change-this-to-secure-password"

  # Vault
  VAULT_TOKEN: "change-this-to-secure-vault-token"

  # Salt API
  SALT_API_USERNAME: "saltapi"
  SALT_API_PASSWORD: "change-this-to-secure-password"

  # Email
  EMAIL_SMTP_USERNAME: "your-email@gmail.com"
  EMAIL_SMTP_PASSWORD: "your-app-password"
  EMAIL_SMTP_FROM: "OpsPilot <noreply@opspilot.com>"
