---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-frontend
  namespace: opspilot
  labels:
    app: opspilot
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: opspilot
      tier: frontend
  template:
    metadata:
      labels:
        app: opspilot
        tier: frontend
        version: v1.0.0
    spec:
      containers:
        - name: frontend
          image: opspilot-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NGINX_SERVER_NAME
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: NGINX_SERVER_NAME
            - name: NGINX_PORT
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: NGINX_PORT
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-config
                  key: API_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: opspilot-frontend
  namespace: opspilot
  labels:
    app: opspilot
    tier: frontend
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: opspilot
    tier: frontend
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: opspilot-frontend-hpa
  namespace: opspilot
  labels:
    app: opspilot
    tier: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: opspilot-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
