# GitLab CI/CD Pipeline - Frontend
# OpsPilot Vue 3 Frontend

stages:
  - test
  - security
  - build
  - deploy-dev
  - deploy-staging
  - deploy-production

variables:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}/opspilot-frontend
  DOCKER_TLS_CERTDIR: "/certs"

# Default image
default:
  image: node:${NODE_VERSION}-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir /root/.pnpm-store

# ============================================
# Test Stage
# ============================================

unit-tests:
  stage: test
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm run test:unit
  coverage: '/All files[^|]*\|[^|]*\|[^|]*\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - frontend/coverage/
    expire_in: 7 days
  tags:
    - docker

type-check:
  stage: test
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm run type:check
  allow_failure: true
  tags:
    - docker

lint:
  stage: test
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm run lint
  tags:
    - docker

# ============================================
# Security Stage
# ============================================

security-scan:
  stage: security
  script:
    - cd frontend
    - pnpm install --frozen-lockfile
    - pnpm audit --json > audit-report.json || true
  artifacts:
    paths:
      - frontend/audit-report.json
    expire_in: 7 days
  allow_failure: true
  tags:
    - docker

sast:
  stage: security
  include:
    - template: Security/SAST.gitlab-ci.yml
  variables:
    SEARCH_MAX_DEPTH: 4
  tags:
    - docker

dependency-scanning:
  stage: security
  include:
    - template: Security/Dependency-Scanning.gitlab-ci.yml
  tags:
    - docker

container-scanning:
  stage: security
  needs:
    - build-frontend
  variables:
    GIT_STRATEGY: none
  include:
    - template: Security/Container-Scanning.gitlab-ci.yml
  tags:
    - docker

# ============================================
# Build Stage
# ============================================

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} -f Dockerfile.frontend .
    - docker build -t ${DOCKER_IMAGE}:latest -f Dockerfile.frontend .
    - docker push ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${DOCKER_IMAGE}:latest
  tags:
    - docker

# ============================================
# Deploy Stage
# ============================================

deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:latest
  environment:
    name: development
    url: https://dev.opspilot.com
  script:
    - kubectl config use-context ${KUBE_CONTEXT_DEV}
    - kubectl set image deployment/opspilot-frontend frontend=${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} -n opspilot-dev
    - kubectl rollout status deployment/opspilot-frontend -n opspilot-dev
  only:
    - develop
  tags:
    - k8s

deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:latest
  environment:
    name: staging
    url: https://staging.opspilot.com
  script:
    - kubectl config use-context ${KUBE_CONTEXT_STAGING}
    - kubectl set image deployment/opspilot-frontend frontend=${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} -n opspilot-staging
    - kubectl rollout status deployment/opspilot-frontend -n opspilot-staging
  only:
    - main
  when: manual
  tags:
    - k8s

deploy-production:
  stage: deploy-production
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://app.opspilot.com
  script:
    - kubectl config use-context ${KUBE_CONTEXT_PROD}
    - kubectl set image deployment/opspilot-frontend frontend=${DOCKER_IMAGE}:${CI_COMMIT_SHA} -n opspilot
    - kubectl rollout status deployment/opspilot-frontend -n opspilot
  only:
    - production
  when: manual
  tags:
    - k8s

# ============================================
# Rollback
# ============================================

rollback-frontend:
  stage: deploy-production
  image: bitnami/kubectl:latest
  environment:
    name: production
    url: https://app.opspilot.com
  script:
    - kubectl config use-context ${KUBE_CONTEXT_PROD}
    - kubectl rollout undo deployment/opspilot-frontend -n opspilot
    - kubectl rollout status deployment/opspilot-frontend -n opspilot
  when: manual
  tags:
    - k8s
