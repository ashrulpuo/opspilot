# OpsPilot Local Development Environment
# Docker Compose configuration for PostgreSQL, Redis, and Vault

services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: opspilot-postgres
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opspilot-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    ports:
      - "6384:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - opspilot-network

  # Vault
  vault:
    image: hashicorp/vault:latest
    container_name: opspilot-vault
    environment:
      SKIP_SETCAP: "true"
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8201:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - opspilot-network
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Insight (optional - for Redis GUI)
  redis-insight:
    image: redis/redisinsight:latest
    container_name: opspilot-redis-insight
    ports:
      - "8002:8001"
    volumes:
      - redis_insight_data:/db
    depends_on:
      - redis
    networks:
      - opspilot-network

  # pgAdmin (optional - for PostgreSQL GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opspilot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - opspilot-network

  # Hot-reload API + Vite UI (opt-in: docker compose --profile dev up -d dev-backend dev-frontend)
  dev-backend:
    profiles: ["dev"]
    image: python:3.12-bookworm
    container_name: opspilot-dev-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - deploy/.env
    environment:
      # Keep DB/Redis/Vault URLs from deploy/.env (must match existing postgres_data password).
      PUBLIC_API_BASE_URL: https://opspilot.appfinityhub.com/api/v1
      app_url: https://opspilot.appfinityhub.com
      ALLOWED_ORIGINS: '["https://opspilot.appfinityhub.com","http://127.0.0.1:8848","http://localhost:8848","http://127.0.0.1:8000","http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - opspilot-network
    command: >
      sh -c "pip install --no-cache-dir -q -e '.[dev]' &&
             alembic upgrade head &&
             exec uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  dev-frontend:
    profiles: ["dev"]
    image: node:22-bookworm
    container_name: opspilot-dev-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - dev_frontend_node_modules:/app/node_modules
    environment:
      VITE_PORT: "8848"
      HUSKY: "0"
      VITE_API_URL: "https://opspilot.appfinityhub.com"
      VITE_WS_URL: "wss://opspilot.appfinityhub.com"
      VITE_DEV_PUBLIC_HOST: "opspilot.appfinityhub.com"
    ports:
      - "8848:8848"
    depends_on:
      - dev-backend
    networks:
      - opspilot-network
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq git >/dev/null &&
             (test -d .git || git init -q) &&
             git config user.email docker@local && git config user.name docker &&
             corepack enable && corepack prepare pnpm@10.11.0 --activate &&
             pnpm install --frozen-lockfile &&
             exec pnpm exec vite --host 0.0.0.0 --port 8848"

volumes:
  postgres_data:
  redis_data:
  redis_insight_data:
  pgadmin_data:
  dev_frontend_node_modules:

networks:
  opspilot-network:
    driver: bridge
